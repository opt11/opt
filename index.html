<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT</title>

<style>

body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0b0f14;
    color:#fff;
}

.topbar {
    background:#121720;
    padding:8px;
    text-align:center;
    font-size:13px;
    color:#9aa4b2;
}

/* GRID LAYOUT */
.main {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
    padding:12px;
}

.column {
    background:#0e131a;
    padding:12px;
}

/* ROWS */
.row {
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #1c2330;
}

.label {
    font-size:12px;
    color:#7f8a99;
}

input, select {
    background:transparent;
    border:none;
    border-bottom:1px solid #2a3240;
    color:#fff;
    width:120px;
    text-align:right;
}

/* BUTTON */
.button {
    margin:15px 12px;
    width:calc(100% - 24px);
    background:#1f2633;
    border:1px solid #2f394a;
    padding:12px;
    color:#fff;
}

/* DISPLAY */
.bottom {
    margin:12px;
    background:#000;
    height:280px;
    position:relative;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.atm-inline {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:220px;
    font-weight:900;
    opacity:0.05;
}

/* TOP */
.topline {
    display:flex;
    justify-content:space-between;
    z-index:2;
}

.tow {
    font-size:42px;
    font-weight:900;
}

.sel {
    font-size:28px;
    font-weight:700;
}

/* STRIP */
.vstrip {
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:10px;
    z-index:2;
}

.vcell {
    flex:1;
    text-align:center;
}

.vsmall .vbig {
    font-size:30px;
    font-weight:700;
}

.vbigblock .vbig {
    font-size:56px;
    font-weight:900;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE</div>

<div class="main">

<!-- LEFT COLUMN -->
<div class="column">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG</span><input id="cg" value="25"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>
<div class="row"><span class="label">RWY LEN</span><input id="rwylength" value="3000m"></div>

<div class="row">
<span class="label">FLAPS</span>
<select id="flap">
<option value="opt">OPTIMUM</option>
<option value="1">1</option>
<option value="5">5</option>
<option value="15">15</option>
</select>
</div>

</div>

<!-- RIGHT COLUMN -->
<div class="column">

<div class="row">
<span class="label">ATM MODE</span>
<select id="atmMode">
<option value="max">MAX</option>
<option value="opt">OPT</option>
<option value="full">FULL</option>
</select>
</div>

<div class="row">
<span class="label">RWY COND</span>
<select id="cond">
<option value="dry">DRY</option>
<option value="wet">WET</option>
<option value="cont">CONT</option>
</select>
</div>

<div class="row">
<span class="label">ANTI ICE</span>
<select id="anti">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>
</div>

<div class="row">
<span class="label">AIR COND</span>
<select id="packs">
<option value="on">ON</option>
<option value="off">OFF</option>
</select>
</div>

<div class="row">
<span class="label">RTG</span>
<select id="rtg">
<option value="0">OFF</option>
<option value="1">RTG1</option>
<option value="2">RTG2</option>
</select>
</div>

</div>

</div>

<button class="button" onclick="calc()">CALCULATE</button>

<!-- DISPLAY -->
<div class="bottom">

<div class="atm-inline" id="modeLabel">ATM</div>

<div class="topline">
    <div class="tow" id="tow">TOWG ---</div>
    <div class="sel" id="sel">SEL ---</div>
</div>

<div class="vstrip">

<div class="vcell vsmall">
<div>FLAP</div>
<div class="vbig" id="flapOut">--</div>
</div>

<div class="vcell vsmall">
<div>ACCEL HT</div>
<div class="vbig" id="accel">1500</div>
</div>

<div class="vcell vsmall">
<div>TRIM</div>
<div class="vbig" id="trim">--</div>
</div>

<div class="vcell vbigblock">
<div>V1</div>
<div class="vbig" id="v1">---</div>
</div>

<div class="vcell vbigblock">
<div>VR</div>
<div class="vbig" id="vr">---</div>
</div>

<div class="vcell vbigblock">
<div>V2</div>
<div class="vbig" id="v2">---</div>
</div>

</div>

</div>

<script>

function num(v){ return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0; }
function getUnit(v){ return (v+"").toLowerCase().includes("lb") ? "LB":"KG"; }
function toKg(v,u){ return u==="LB"?v*0.453592:v; }
function fromKg(v,u){ return u==="LB"?v/0.453592:v; }

function calc(){

let raw = tw.value;
let unit = getUnit(raw);
let w = num(raw);
let wkg = toKg(w,unit);

let cgVal = num(cg.value);
let t = num(tt.value);
let press = num(tpress.value);
let len = num(rwylength.value);

let atm = atmMode.value;
let condVal = cond.value;
let antiVal = anti.value;
let packsVal = packs.value;
let rtgVal = parseInt(rtg.value);

/* TOWG */
let towg = wkg - (200 + (wkg-65000)*0.002);
tow.innerHTML = "TOWG " + Math.round(fromKg(towg,unit)) + " " + unit;

/* FLAP LOGIC */
let flapSel = flap.value;
if(flapSel === "opt"){
    if(len < 1800) flapSel = "15";
    else if(len < 2600) flapSel = "5";
    else flapSel = "1";
}
flapOut.innerHTML = flapSel;

/* SEL TEMP */
let selTemp = 40 - (wkg-65000)/180 - (t-15)*1.1;

if(atm==="max") selTemp+=10;
if(atm==="full") selTemp=0;

if(condVal==="wet") selTemp-=5;
if(condVal==="cont") selTemp-=10;
if(antiVal==="on") selTemp-=5;
if(packsVal==="on") selTemp-=3;

selTemp -= rtgVal*5;

/* flap effect */
if(flapSel==="1") selTemp+=5;
if(flapSel==="15") selTemp-=8;

selTemp = Math.max(20, Math.min(65, selTemp));

sel.innerHTML = (atm==="full") ? "FULL" : "SEL "+Math.round(selTemp)+"°C";

/* ACCEL HT */
let accelHt = 1500;
if(wkg>70000) accelHt+=500;
if(len<2200) accelHt+=500;
accel.innerHTML = accelHt;

/* TRIM */
let trimVal = 6 - (cgVal-20)*0.1 - (wkg-65000)*0.00002;
if(flapSel==="1") trimVal-=0.2;
if(flapSel==="15") trimVal+=0.3;
trim.innerHTML = trimVal.toFixed(1);

/* SPEEDS */
let v1v = 132 + (wkg-65000)*0.001;
let vrv = v1v + 2;
let v2v = vrv + 10;

if(condVal==="wet"){ v1v+=2; vrv+=2; v2v+=2; }
if(condVal==="cont"){ v1v+=4; vrv+=4; v2v+=4; }
if(antiVal==="on"){ v1v+=1; vrv+=1; v2v+=1; }

if(flapSel==="1"){ v1v+=5; vrv+=5; v2v+=5; }
if(flapSel==="15"){ v1v-=6; vrv-=6; v2v-=6; }

v1.innerHTML = Math.round(v1v);
vr.innerHTML = Math.round(vrv);
v2.innerHTML = Math.round(v2v);

/* MODE */
modeLabel.innerHTML = (atm==="full")?"FULL":"ATM";

}

</script>

</body>
</html>
