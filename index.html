<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#1c1f26;
    color:#fff;
}

.topbar {
    background:#2a2f38;
    padding:12px;
    text-align:center;
    font-weight:600;
}

.main {
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:20px;
    padding:20px;
}

.left, .right {
    background:#222833;
    padding:18px;
}

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2e3542;
    padding:12px;
    margin-bottom:10px;
}

.label { color:#ccc; }

input, select {
    background:#1c1f26;
    border:1px solid #3a4250;
    color:#fff;
    padding:10px;
    width:170px;
    text-align:right;
}

.button {
    float:right;
    background:#3a4250;
    border:1px solid #5a6475;
    padding:8px 18px;
    color:#fff;
}

.output {
    margin-top:15px;
    font-family:monospace;
}

.vbig { font-size:30px; font-weight:800; }

.bottom {
    margin-top:15px;
    background:#000;
    padding:18px;
    display:grid;
    grid-template-columns: repeat(5,1fr);
    align-items:center;
}

.atm-inline {
    font-size:160px;
    font-weight:900;
    opacity:0.18;
    text-align:center;
}
</style>
</head>

<body>

<div class="topbar">PERFORMANCE - TAKEOFF</div>

<div class="main">

<div class="left">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG (%MAC)</span><input id="tcg" value="25"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>

<div class="row">
<span class="label">RUNWAY HDG</span>
<input id="rwyhdg" value="090">
</div>

<div class="row">
<span class="label">RUNWAY LENGTH</span>
<input id="rwylength" value="3000m">
</div>

<div class="row">
<span class="label">THRUST MODE</span>
<select id="mode">
<option value="atm">ATM</option>
<option value="full">FULL</option>
</select>
</div>

<!-- ✅ INLINE FIX -->
<button class="button" onclick="calcTakeoff()">Calculate</button>

<div class="output" id="toOut">READY</div>

<hr style="border-color:#333;">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<!-- ✅ INLINE FIX -->
<button class="button" onclick="calcLanding()">Calculate</button>

<div class="output" id="loOut">READY</div>

</div>

<div class="right"></div>

</div>

<div class="bottom">

<div class="atm-inline" id="atmLabel">ATM</div>

<div>FLAP<br><span>5</span></div>
<div>ACCEL HT<br><span>1500 ft</span></div>
<div>V1<br><span id="v1b">---</span></div>
<div>VR<br><span id="vrb">---</span></div>
<div>V2<br><span id="v2b">---</span></div>

</div>

<script>

function num(v){
    return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0;
}

function wind(v){
    v = (v+"").split("/");
    return num(v.length > 1 ? v[1] : v[0]);
}

function runwayLength(v){
    v = (v+"").toLowerCase().trim();
    var value = parseFloat(v.replace(/[^0-9.]/g,"")) || 0;
    if(v.indexOf("ft") !== -1) return value * 0.3048;
    return value;
}

function calcTakeoff(){

    var w = num(document.getElementById("tw").value);
    var t = num(document.getElementById("tt").value);
    var cg = num(document.getElementById("tcg").value);
    var press = num(document.getElementById("tpress").value);
    var windv = wind(document.getElementById("twind").value);
    var mode = document.getElementById("mode").value;

    var rwyhdg = num(document.getElementById("rwyhdg").value);
    var rwylength = runwayLength(document.getElementById("rwylength").value);

    document.getElementById("atmLabel").innerHTML =
        (mode === "atm") ? "ATM" : "FULL";

    var weightFactor = (w - 65000) * 0.0011;
    var tempFactor = (t - 15) * 0.22;
    var pressFactor = (1013 - press) * 0.015;
    var windFactor = -windv * 0.04;

    var headingPenalty = Math.abs((rwyhdg % 360) - 180) / 180;
    var rwyEffect = (headingPenalty - 0.5) * 1.5;

    var v1 = 132 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;
    var vr = 134 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;
    var v2 = 144 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;

    if(mode === "atm"){
        v1 -= 1; vr -= 1; v2 -= 1;
    } else {
        v1 += 2; vr += 2; v2 += 2;
    }

    var rwyClamp = Math.min(1.03, Math.max(0.98, rwylength / 2500));
    v1 *= rwyClamp;
    vr *= rwyClamp;
    v2 *= rwyClamp;

    vr = Math.max(vr, v1 + 1);
    v2 = Math.max(v2, vr + 6);

    v1 = Math.round(v1 + 8);
    vr = Math.round(vr + 8);
    v2 = Math.round(v2 + 8);

    document.getElementById("toOut").innerHTML =
        "MODE: " + mode.toUpperCase() + "<br>" +
        "V1: " + v1 + "<br>" +
        "VR: " + vr + "<br>" +
        "V2: " + v2;

    document.getElementById("v1b").innerText = v1;
    document.getElementById("vrb").innerText = vr;
    document.getElementById("v2b").innerText = v2;
}

function calcLanding(){

    var w = num(document.getElementById("lw").value);
    var t = num(document.getElementById("lt").value);
    var windv = wind(document.getElementById("lwind").value);

    var vref = 130 + (w - 60000) * 0.00055 + windv * 0.15;
    var dist = 1400 * (0.7 + w / 70000) * (1 + (t - 15) * 0.01);

    document.getElementById("loOut").innerHTML =
        "VREF: " + Math.round(vref) + "<br>" +
        "LDG DIST: " + Math.round(dist) + " m";
}

</script>

</body>
</html>
