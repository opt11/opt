<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT</title>

<style>

body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0b0f14;
    color:#fff;
}

.topbar {
    background:#121720;
    padding:8px;
    text-align:center;
    font-size:13px;
    color:#9aa4b2;
}

.main {
    padding:12px;
}

.row {
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #1c2330;
}

.label {
    font-size:12px;
    color:#7f8a99;
}

input, select {
    background:transparent;
    border:none;
    border-bottom:1px solid #2a3240;
    color:#fff;
    width:130px;
    text-align:right;
}

.button {
    margin-top:15px;
    width:100%;
    background:#1f2633;
    border:1px solid #2f394a;
    padding:10px;
    font-size:13px;
    color:#fff;
}

/* DISPLAY */
.bottom {
    margin-top:15px;
    background:#000;
    height:260px;
    position:relative;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* WATERMARK */
.atm-inline {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:220px;
    font-weight:900;
    opacity:0.05;
    letter-spacing:18px;
}

/* TOP */
.topline {
    display:flex;
    justify-content:space-between;
    z-index:2;
}

.tow {
    font-size:40px;
    font-weight:900;
}

.sel {
    font-size:26px;
    font-weight:700;
}

/* STRIP */
.vstrip {
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:10px;
    z-index:2;
}

.vcell {
    flex:1;
    text-align:center;
}

/* CONFIG BIGGER */
.vsmall .vlabel {
    font-size:12px;
    color:#666;
}

.vsmall .vbig {
    font-size:30px;
    font-weight:700;
}

/* SPEEDS */
.vbigblock .vlabel {
    font-size:12px;
    color:#888;
}

.vbigblock .vbig {
    font-size:56px;
    font-weight:900;
}

.divider {
    width:20px;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE</div>

<div class="main">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG</span><input value="25"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>
<div class="row"><span class="label">RWY HDG</span><input id="rwyhdg" value="090"></div>
<div class="row"><span class="label">RWY LEN</span><input id="rwylength" value="3000m"></div>

<div class="row">
<span class="label">ATM MODE</span>
<select id="atmMode">
<option value="max">MAX</option>
<option value="opt">OPT</option>
<option value="full">FULL</option>
</select>
</div>

<div class="row">
<span class="label">RWY COND</span>
<select id="rwycond">
<option value="dry">DRY</option>
<option value="wet">WET</option>
<option value="cont">CONT</option>
</select>
</div>

<button class="button" onclick="calcTakeoff()">CALCULATE</button>

<div class="bottom">

<div class="atm-inline" id="atmLabel">ATM</div>

<div class="topline">
    <div class="tow" id="tow">TOWG ---</div>
    <div class="sel" id="selTemp">SEL ---</div>
</div>

<div class="vstrip">

<div class="vcell vsmall">
<div class="vlabel">FLAP</div>
<div class="vbig">5</div>
</div>

<div class="vcell vsmall">
<div class="vlabel">ACCEL HT</div>
<div class="vbig" id="accel">1500</div>
</div>

<div class="divider"></div>

<div class="vcell vbigblock">
<div class="vlabel">V1</div>
<div class="vbig" id="v1b">---</div>
</div>

<div class="vcell vbigblock">
<div class="vlabel">VR</div>
<div class="vbig" id="vrb">---</div>
</div>

<div class="vcell vbigblock">
<div class="vlabel">V2</div>
<div class="vbig" id="v2b">---</div>
</div>

</div>

</div>

</div>

<script>

function num(v){
    return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0;
}

function getUnit(v){
    v = (v+"").toLowerCase();
    if(v.includes("lb")) return "LB";
    return "KG";
}

function toKg(v, unit){
    return (unit==="LB") ? v * 0.453592 : v;
}

function fromKg(v, unit){
    return (unit==="LB") ? v / 0.453592 : v;
}

function wind(v){
    v = (v+"").split("/");
    return num(v.length > 1 ? v[1] : v[0]);
}

function runwayLength(v){
    v = (v+"").toLowerCase();
    var value = parseFloat(v.replace(/[^0-9.]/g,"")) || 0;
    if(v.indexOf("ft") !== -1) return value * 0.3048;
    return value;
}

function calcTakeoff(){

    var raw = document.getElementById("tw").value;
    var unit = getUnit(raw);
    var w = num(raw);

    var wkg = toKg(w, unit);

    var t = num(document.getElementById("tt").value);
    var press = num(document.getElementById("tpress").value);
    var windv = wind(document.getElementById("twind").value);
    var atmMode = document.getElementById("atmMode").value;
    var cond = document.getElementById("rwycond").value;

    var rwylength = runwayLength(document.getElementById("rwylength").value);

    /* TOWG CALC */
    var taxiBurn = 200 + (wkg - 65000) * 0.002;
    var towg = wkg - taxiBurn;

    var towgDisplay = Math.round(fromKg(towg, unit));
    document.getElementById("tow").innerHTML = "TOWG " + towgDisplay + " " + unit;

    document.getElementById("atmLabel").innerHTML =
        (atmMode === "full") ? "FULL" : "ATM";

    /* SEL TEMP */
    var baseSel = 40 - (wkg-65000)/180 - (t-15)*1.1;

    if(atmMode === "max") baseSel += 10;
    if(atmMode === "full") baseSel = 0;

    if(cond === "wet") baseSel -= 5;
    if(cond === "cont") baseSel -= 10;

    var sel = Math.round(baseSel);
    sel = Math.max(20, Math.min(65, sel));

    document.getElementById("selTemp").innerHTML =
        (atmMode==="full") ? "FULL" : ("SEL " + sel + "°C");

    /* ACCEL HEIGHT */
    var accel = 1500;
    if(wkg > 70000) accel += 500;
    if(rwylength < 2200) accel += 500;
    if(rwylength < 1800) accel += 500;
    accel = Math.min(3000, accel);

    document.getElementById("accel").innerHTML = accel;

    /* SPEEDS */
    var v1 = 132 + (wkg-65000)*0.0011;
    var vr = v1 + 2;
    var v2 = vr + 10;

    if(cond === "wet"){ v1+=2; vr+=2; v2+=2; }
    if(cond === "cont"){ v1+=4; vr+=4; v2+=4; }

    document.getElementById("v1b").innerHTML = Math.round(v1);
    document.getElementById("vrb").innerHTML = Math.round(vr);
    document.getElementById("v2b").innerHTML = Math.round(v2);
}

</script>

</body>
</html>
