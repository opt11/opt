<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0b0f14;
    color: #e6e6e6;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input { -moz-appearance: textfield; }

.header {
    background: #0f1620;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #1f2a3a;
}

.header span { color:#8aa0b6; }

.container {
    width: 1000px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.panel {
    background:#121a24;
    padding:15px;
    border-radius:10px;
}

.title {
    font-size:12px;
    color:#8aa0b6;
    margin-bottom:12px;
    border-bottom:1px solid #1f2a3a;
    padding-bottom:6px;
}

.field {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#1a2633;
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
}

.field input,
.field select {
    flex:1;
    margin-left:12px;
    padding:6px 8px;
    border-radius:5px;
    border:1px solid #2a3a4d;
    background:#0f1620;
    color:#e6e6e6;
    outline:none;
}

.button {
    background:#2d7dff;
    padding:10px;
    text-align:center;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

/* FIX: make button behave like old div visually */
button.button {
    border: none;
    width: 100%;
}

.button:hover { background:#1f66dd; }

.output {
    margin-top:10px;
    background:#0f1620;
    padding:10px;
    border-radius:6px;
    border:1px solid #1f2a3a;
    font-family:monospace;
}

.green { color:#4df07d; }
.yellow { color:#ffd34d; }
</style>
</head>

<body>

<div class="header">
    <div>B737 OPT PERFORMANCE TOOL</div>
    <span>TAKEOFF + LANDING</span>
</div>

<div class="container">

<div class="row">

<!-- TAKEOFF -->
<div class="panel">
    <div class="title">TAKEOFF DATA</div>

    <div class="field">
        <span>Weight (kg)</span>
        <input id="tw" value="65000">
    </div>

    <div class="field">
        <span>OAT (°C)</span>
        <input id="tt" value="15">
    </div>

    <div class="field">
        <span>Wind (KT)</span>
        <input id="twind" value="0">
    </div>

    <div class="field">
        <span>Pressure (hPa)</span>
        <input id="tpress" value="1013">
    </div>

    <div class="field">
        <span>Runway Length (m)</span>
        <input id="trwy" value="2500">
    </div>

    <div class="button-container">
        <button class="button" onclick="calcTakeoff()">CALCULATE TAKEOFF</button>
    </div>

    <div class="output" id="toOut">READY</div>
</div>

<!-- LANDING -->
<div class="panel">
    <div class="title">LANDING DATA</div>

    <div class="field">
        <span>Landing Weight (kg)</span>
        <input id="lw" value="60000">
    </div>

    <div class="field">
        <span>OAT (°C)</span>
        <input id="lt" value="15">
    </div>

    <div class="field">
        <span>Wind (KT)</span>
        <input id="lwind" value="0">
    </div>

    <div class="field">
        <span>Surface</span>
        <select id="lsurf">
            <option value="dry">Dry</option>
            <option value="wet">Wet</option>
            <option value="contaminated">Contaminated</option>
        </select>
    </div>

    <div class="button-container">
        <button class="button" onclick="calcLanding()">CALCULATE LANDING</button>
    </div>

    <div class="output" id="loOut">READY</div>
</div>

</div>

</div>

<script>

function num(id){
    return parseFloat(document.getElementById(id).value) || 0;
}

/* ================= TAKEOFF ================= */
function calcTakeoff(){

    let w = num("tw");
    let t = num("tt");
    let wind = num("twind");
    let press = num("tpress");
    let rwy = num("trwy");

    let base = {v1:125, vr:126, v2:135};

    let weight = (w-65000)*0.0012;
    let temp = (t-15)*0.05;
    let windCorr = wind*-0.015;
    let pressure = (1013-press)*0.015;

    let v1 = base.v1 + weight + temp + windCorr + pressure;
    let vr = base.vr + weight + temp + windCorr + pressure;
    let v2 = base.v2 + weight + temp + windCorr + pressure;

    let spacing = 6 + Math.max(0,(w-65000)*0.0001);

    vr = Math.max(vr, v1 + 1);
    v2 = Math.max(v2, vr + spacing);

    let bias = 7;
    let vTrim = 5;

    v1 = Math.round(v1 + bias + vTrim);
    vr = Math.round(vr + bias + vTrim);
    v2 = Math.round(v2 + bias + vTrim);

    let flex = 30 + (65000-w)*0.0005 + (15-t)*0.25;
    flex = Math.max(35, Math.min(55, flex));
    flex = Math.round(flex);

    let bleed = (rwy < 2000 || w > 68000) ? "REDUCED" : "AUTO";
    let antiIce = (t < 5) ? "ON" : "OFF";

    document.getElementById("toOut").innerHTML =
    `V1: <span class="green">${v1}</span><br>
     VR: <span class="green">${vr}</span><br>
     V2: <span class="green">${v2}</span><br>
     FLEX: <span class="yellow">${flex}°C</span><br>
     BLEED: ${bleed}<br>
     ANTI-ICE: ${antiIce}<br>
     FLAPS: 5`;
}

/* ================= LANDING ================= */
function calcLanding(){

    let w = num("lw");
    let t = num("lt");
    let wind = num("lwind");
    let surf = document.getElementById("lsurf").value;

    let vref = 125 + (w-60000)*0.0006 + wind*0.2;

    let surfaceMult =
        surf=="dry"?1 :
        surf=="wet"?1.18 : 1.35;

    let dist = 1400 * (0.7 + w/70000) * (1 + (t-15)*0.01) * surfaceMult;

    document.getElementById("loOut").innerHTML =
    `VREF: <span class="yellow">${Math.round(vref)}</span><br>
     LDG DIST: <span class="green">${Math.round(dist)} m</span>`;
}

</script>

</body>
</html>
