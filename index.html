<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>

body {
    margin:0;
    font-family: Arial;
    background:#1c1f26;
    color:#fff;
}

.topbar {
    position:relative;
    z-index:2;
    background:#2a2f38;
    padding:12px;
    text-align:center;
    font-weight:600;
}

.main {
    position:relative;
    z-index:2;
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:20px;
    padding:20px;
}

.left, .right {
    background:#222833;
    padding:18px;
}

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2e3542;
    padding:12px;
    margin-bottom:10px;
}

.label { color:#ccc; }

input, select {
    background:#1c1f26;
    border:1px solid #3a4250;
    color:#fff;
    padding:10px;
    width:170px;
    text-align:right;
}

.button {
    float:right;
    background:#3a4250;
    border:1px solid #5a6475;
    padding:8px 18px;
    color:#fff;
    cursor:pointer;
}

.output {
    margin-top:15px;
    font-family:monospace;
}

.vbig { font-size:30px; font-weight:800; }
.biginfo { font-size:20px; font-weight:800; }

/* =========================
   BOTTOM BAR
========================= */
.bottom {
    position:relative;
    z-index:2;

    margin-top:15px;
    background:#000;
    padding:18px;

    display:grid;
    grid-template-columns: repeat(5,1fr);
    align-items:center;
}

/* ✈️ ATM WATERMARK (5x BIGGER) */
.atm-inline {
    font-size:160px;     /* 👈 5x bigger */
    font-weight:900;
    letter-spacing:8px;

    opacity:0.18;
    text-align:center;
    line-height:1;
}

/* V speed blocks */
.bottom span {
    font-size:26px;
    font-weight:800;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE - TAKEOFF</div>

<div class="main">

<div class="left">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG (%MAC)</span><input id="tcg" value="25"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>

<button class="button" onclick="calcTakeoff()">Calculate</button>

<div class="output" id="toOut">READY</div>

<hr style="border-color:#333;">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">Calculate</button>

<div class="output" id="loOut">READY</div>

</div>

<div class="right">SYSTEM ACTIVE</div>

</div>

<!-- =========================
     BOTTOM BAR WITH BIG ATM
========================= -->
<div class="bottom">

<div class="atm-inline">ATM</div>

<div>FLAP<br><span>5</span></div>
<div>ACCEL HT<br><span>1500 ft</span></div>
<div>V1<br><span id="v1b">---</span></div>
<div>VR<br><span id="vrb">---</span></div>
<div>V2<br><span id="v2b">---</span></div>

</div>

<script>

/* SAFE PARSER */
function num(v){
    return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0;
}

function wind(v){
    v = (v+"").split("/");
    return num(v.length>1 ? v[1] : v[0]);
}

/* ===== TAKEOFF ===== */
function calcTakeoff(){

    var w = num(document.getElementById("tw").value);
    var t = num(document.getElementById("tt").value);
    var cg = num(document.getElementById("tcg").value);
    var press = num(document.getElementById("tpress").value);
    var windv = wind(document.getElementById("twind").value);

    var v1 = 125 + (w-65000)*0.0012 + (t-15)*0.05 - windv*0.015 + (1013-press)*0.015;
    var vr = 126 + (w-65000)*0.0012 + (t-15)*0.05 - windv*0.015 + (1013-press)*0.015;
    var v2 = 135 + (w-65000)*0.0012 + (t-15)*0.05 - windv*0.015 + (1013-press)*0.015;

    vr = Math.max(vr, v1+1);
    v2 = Math.max(v2, vr+6);

    v1 = Math.round(v1 + 12);
    vr = Math.round(vr + 12);
    v2 = Math.round(v2 + 12);

    var trim =
        4.5
        + (cg - 25) * -0.18
        + (w - 65000) * 0.000012;

    if(trim < 3.5) trim = 3.5;
    if(trim > 7.8) trim = 7.8;

    trim = Math.round(trim*10)/10;

    document.getElementById("toOut").innerHTML =
    "V1: <span class='vbig'>" + v1 + "</span><br>" +
    "VR: <span class='vbig'>" + vr + "</span><br>" +
    "V2: <span class='vbig'>" + v2 + "</span><br>" +
    "TRIM: <span class='biginfo'>" + trim + "</span>";

    document.getElementById("v1b").innerHTML = v1;
    document.getElementById("vrb").innerHTML = vr;
    document.getElementById("v2b").innerHTML = v2;
}

/* ===== LANDING ===== */
function calcLanding(){

    var w = num(document.getElementById("lw").value);
    var t = num(document.getElementById("lt").value);
    var windv = wind(document.getElementById("lwind").value);

    var vref = 125 + (w-60000)*0.0006 + windv*0.2;
    var dist = 1400*(0.7 + w/70000)*(1+(t-15)*0.01);

    document.getElementById("loOut").innerHTML =
    "VREF: <span class='biginfo'>" + Math.round(vref) + "</span><br>" +
    "LDG DIST: <span class='biginfo'>" + Math.round(dist) + " m</span>";
}

</script>

</body>
</html>
