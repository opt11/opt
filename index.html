<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>B737 OPT</title>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#fff; }

.topbar {
    background:#121720;
    padding:8px;
    text-align:center;
    font-size:13px;
}

.row {
    display:flex;
    justify-content:space-between;
    padding:8px 12px;
    border-bottom:1px solid #1c2330;
}

.half {
    width:48%;
    display:flex;
    justify-content:space-between;
}

.label { font-size:12px; color:#7f8a99; }

input, select {
    background:transparent;
    border:none;
    border-bottom:1px solid #2a3240;
    color:#fff;
    width:100px;
    text-align:right;
}

.button {
    width:calc(100% - 24px);
    margin:12px;
    padding:12px;
    background:#1f2633;
    border:1px solid #2f394a;
    color:#fff;
}

.bottom {
    margin:12px;
    background:#000;
    height:280px;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
}

.atm-inline {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:220px;
    opacity:0.05;
}

.topline {
    display:flex;
    justify-content:space-between;
}

.tow { font-size:42px; font-weight:900; }
.sel { font-size:28px; }

.vstrip {
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

.vcell { text-align:center; flex:1; }

.vsmall .vbig { font-size:28px; }
.vbigblock .vbig { font-size:56px; font-weight:900; }
</style>
</head>

<body>

<div class="topbar">PERFORMANCE</div>

<div class="row">
<div class="half"><span class="label">WEIGHT</span><input id="tw" value="51600kg"></div>
<div class="half"><span class="label">CG</span><input id="cg" value="22.4"></div>
</div>

<div class="row">
<div class="half"><span class="label">OAT</span><input id="tt" value="11C"></div>
<div class="half"><span class="label">PRESS</span><input id="tpress" value="1015hPa"></div>
</div>

<div class="row">
<div class="half"><span class="label">RWY LEN</span><input id="rwylength" value="6500ft"></div>
<div class="half">
<span class="label">FLAPS</span>
<select id="flap">
<option value="opt">OPT</option>
<option value="1">1</option>
<option value="5">5</option>
<option value="15">15</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">ATM MODE</span>
<select id="atmMode">
<option value="max">MAX</option>
<option value="opt" selected>OPT</option>
<option value="full">FULL</option>
</select>
</div>
<div class="half">
<span class="label">RWY COND</span>
<select id="cond">
<option value="dry">DRY</option>
<option value="wet">WET</option>
<option value="cont">CONT</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">ANTI ICE</span>
<select id="anti">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>
</div>
<div class="half">
<span class="label">AIR COND</span>
<select id="packs">
<option value="on">ON</option>
<option value="off">OFF</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">RTG</span>
<select id="rtg">
<option value="0">OFF</option>
<option value="1">RTG1</option>
<option value="2">RTG2</option>
</select>
</div>
<div class="half"></div>
</div>

<button class="button" onclick="calc()">CALCULATE</button>

<div class="bottom">

<div class="atm-inline" id="modeLabel">ATM</div>

<div class="topline">
<div class="tow" id="tow">TOWG ---</div>
<div class="sel" id="sel">SEL ---</div>
</div>

<div class="vstrip">

<div class="vcell vsmall">
<div>FLAP</div>
<div class="vbig" id="flapOut">--</div>
</div>

<div class="vcell vsmall">
<div>ACCEL</div>
<div class="vbig" id="accel">1500</div>
</div>

<div class="vcell vsmall">
<div>TRIM</div>
<div class="vbig" id="trim">--</div>
</div>

<div class="vcell vbigblock">
<div>V1</div>
<div class="vbig" id="v1">---</div>
</div>

<div class="vcell vbigblock">
<div>VR</div>
<div class="vbig" id="vr">---</div>
</div>

<div class="vcell vbigblock">
<div>V2</div>
<div class="vbig" id="v2">---</div>
</div>

</div>

</div>

<script>

function num(v){
    return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0;
}

function calc(){

var w = num(document.getElementById("tw").value);
var cgVal = num(document.getElementById("cg").value);
var len = num(document.getElementById("rwylength").value);
var oat = num(document.getElementById("tt").value);

var flapSel = document.getElementById("flap").value;

/* OPT FLAP */
if(flapSel==="opt"){
    if(len < 6000) flapSel="15";
    else if(len < 8000) flapSel="5";
    else flapSel="1";
}

document.getElementById("flapOut").innerHTML = flapSel;

/* TOWG (never exceed input weight) */
var towg = w - 50;
document.getElementById("tow").innerHTML = "TOWG " + Math.round(towg) + " kg";

/* FLEX (more realistic low values) */
var selTemp = 30 - (w / 4000) - (len / 2000);

if(document.getElementById("anti").value==="on") selTemp -= 2;
if(document.getElementById("packs").value==="on") selTemp -= 1;

if(selTemp < oat + 5) selTemp = oat + 5;

document.getElementById("sel").innerHTML = "SEL " + Math.round(selTemp) + "°C";

/* ACCEL */
var accelHt = 1500;
if(len < 7000) accelHt += 500;
document.getElementById("accel").innerHTML = accelHt;

/* TRIM */
var trimVal = 7.2 - (cgVal * 0.12);
document.getElementById("trim").innerHTML = trimVal.toFixed(1);

/* SPEEDS (lowered baseline) */
var base = 100 + (w / 3000);

var v1v = base;
var vrv = base + 1;
var v2v = base + 10;

if(flapSel==="1"){ v1v+=5; vrv+=5; v2v+=5; }
if(flapSel==="5"){ v1v-=3; vrv-=3; v2v-=3; }
if(flapSel==="15"){ v1v-=7; vrv-=7; v2v-=7; }

if(len < 7000){
    v1v -= 4;
    vrv -= 3;
}

document.getElementById("v1").innerHTML = Math.round(v1v);
document.getElementById("vr").innerHTML = Math.round(vrv);
document.getElementById("v2").innerHTML = Math.round(v2v);

/* WATERMARK LOGIC */
var mode = document.getElementById("atmMode").value;

if(mode === "full"){
    document.getElementById("modeLabel").innerHTML = "FULL";
} else {
    document.getElementById("modeLabel").innerHTML = "ATM";
}

}

</script>

</body>
</html>
