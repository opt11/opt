<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT</title>

<style>

body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0b0f14;
    color:#fff;
}

.topbar {
    background:#121720;
    padding:8px;
    text-align:center;
    font-size:13px;
    color:#9aa4b2;
}

/* LAYOUT */
.main {
    display:grid;
    grid-template-columns: 80px 1fr;
}

.sidebar {
    background:#0e131a;
}

.tab {
    padding:15px;
    text-align:center;
    font-size:12px;
    color:#7f8a99;
    border-bottom:1px solid #1c2330;
    cursor:pointer;
}

.tab.active {
    background:#1a2230;
    color:#fff;
}

.content {
    padding:12px;
}

/* INPUT ROWS */
.row {
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #1c2330;
}

.label {
    font-size:12px;
    color:#7f8a99;
}

input, select {
    background:transparent;
    border:none;
    border-bottom:1px solid #2a3240;
    color:#fff;
    width:130px;
    text-align:right;
}

/* BUTTON */
.button {
    margin-top:10px;
    float:right;
    background:#1f2633;
    border:1px solid #2f394a;
    padding:5px 12px;
    font-size:12px;
    color:#fff;
}

/* 🔥 BIG OPT DISPLAY */
.bottom {
    background:#000;
    height:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:15px;
}

/* TOP LINE (MODE + TOW + SEL TEMP) */
.topline {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    font-size:14px;
    color:#ccc;
}

/* CENTER MODE */
.mode {
    font-size:32px;
    font-weight:900;
    color:#fff;
}

/* SPEED STRIP */
.vstrip {
    display:flex;
    justify-content:space-around;
    align-items:flex-end;
}

/* CELL */
.vcell {
    text-align:center;
}

.vlabel {
    font-size:12px;
    color:#777;
    margin-bottom:5px;
}

.vbig {
    font-size:48px;
    font-weight:900;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE</div>

<div class="main">

<div class="sidebar">
    <div class="tab active" onclick="showPanel('tko', this)">TKO</div>
    <div class="tab" onclick="showPanel('ldg', this)">LDG</div>
</div>

<div class="content">

<!-- TAKEOFF -->
<div id="tkoPanel">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG</span><input id="tcg" value="25"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>
<div class="row"><span class="label">RWY HDG</span><input id="rwyhdg" value="090"></div>
<div class="row"><span class="label">RWY LEN</span><input id="rwylength" value="3000m"></div>

<div class="row">
<span class="label">MODE</span>
<select id="mode">
<option value="atm">ATM</option>
<option value="full">FULL</option>
</select>
</div>

<button class="button" onclick="calcTakeoff()">CALC</button>

</div>

<!-- LANDING -->
<div id="ldgPanel" style="display:none">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">CALC</button>

</div>

</div>

</div>

<!-- 🔥 MAIN DISPLAY -->
<div class="bottom">

<div class="topline">
    <div id="tow">TOW ---</div>
    <div class="mode" id="modeDisplay">---</div>
    <div id="selTemp">SEL ---</div>
</div>

<div class="vstrip">

<div class="vcell">
<div class="vlabel">FLAP</div>
<div class="vbig">5</div>
</div>

<div class="vcell">
<div class="vlabel">ACCEL HT</div>
<div class="vbig">1500</div>
</div>

<div class="vcell">
<div class="vlabel">V1</div>
<div class="vbig" id="v1b">---</div>
</div>

<div class="vcell">
<div class="vlabel">VR</div>
<div class="vbig" id="vrb">---</div>
</div>

<div class="vcell">
<div class="vlabel">V2</div>
<div class="vbig" id="v2b">---</div>
</div>

</div>

</div>

<script>

/* PANEL SWITCH */
function showPanel(type, el){
    document.getElementById("tkoPanel").style.display = (type==="tko") ? "block" : "none";
    document.getElementById("ldgPanel").style.display = (type==="ldg") ? "block" : "none";

    var tabs = document.getElementsByClassName("tab");
    for(var i=0;i<tabs.length;i++) tabs[i].classList.remove("active");
    el.classList.add("active");
}

/* SAME LOGIC + DISPLAY ADDITIONS */

function num(v){
    return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0;
}

function wind(v){
    v = (v+"").split("/");
    return num(v.length > 1 ? v[1] : v[0]);
}

function runwayLength(v){
    v = (v+"").toLowerCase();
    var value = parseFloat(v.replace(/[^0-9.]/g,"")) || 0;
    if(v.indexOf("ft") !== -1) return value * 0.3048;
    return value;
}

function calcTakeoff(){

    var w = num(document.getElementById("tw").value);
    var t = num(document.getElementById("tt").value);
    var press = num(document.getElementById("tpress").value);
    var windv = wind(document.getElementById("twind").value);
    var mode = document.getElementById("mode").value;

    var rwyhdg = num(document.getElementById("rwyhdg").value);
    var rwylength = runwayLength(document.getElementById("rwylength").value);

    /* DISPLAY */
    document.getElementById("modeDisplay").innerHTML = mode.toUpperCase();
    document.getElementById("tow").innerHTML = "TOW " + w;

    /* SIMPLE FLEX TEMP MODEL */
    var sel = Math.round(60 - (w-65000)/200 - (t-15)*1.2 - (1013-press)*0.05);
    sel = Math.max(30, Math.min(65, sel));

    document.getElementById("selTemp").innerHTML =
        (mode==="atm") ? ("SEL " + sel + "°C") : "FULL";

    var weightFactor = (w - 65000) * 0.0011;
    var tempFactor = (t - 15) * 0.22;
    var pressFactor = (1013 - press) * 0.015;
    var windFactor = -windv * 0.04;

    var headingPenalty = Math.abs((rwyhdg % 360) - 180) / 180;
    var rwyEffect = (headingPenalty - 0.5) * 1.5;

    var v1 = 132 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;
    var vr = 134 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;
    var v2 = 144 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;

    if(mode === "atm"){
        v1 -= 1; vr -= 1; v2 -= 1;
    } else {
        v1 += 2; vr += 2; v2 += 2;
    }

    var rwyClamp = Math.min(1.03, Math.max(0.98, rwylength / 2500));
    v1 *= rwyClamp;
    vr *= rwyClamp;
    v2 *= rwyClamp;

    vr = Math.max(vr, v1 + 1);
    v2 = Math.max(v2, vr + 6);

    v1 = Math.round(v1 + 8);
    vr = Math.round(vr + 8);
    v2 = Math.round(v2 + 8);

    document.getElementById("v1b").innerHTML = v1;
    document.getElementById("vrb").innerHTML = vr;
    document.getElementById("v2b").innerHTML = v2;
}

function calcLanding(){

    var w = num(document.getElementById("lw").value);
    var t = num(document.getElementById("lt").value);
    var windv = wind(document.getElementById("lwind").value);

    var vref = 130 + (w - 60000) * 0.00055 + windv * 0.15;

    document.getElementById("modeDisplay").innerHTML = "LDG";
    document.getElementById("tow").innerHTML = "LDG WT " + w;
    document.getElementById("selTemp").innerHTML = "";

    document.getElementById("v1b").innerHTML = "-";
    document.getElementById("vrb").innerHTML = "-";
    document.getElementById("v2b").innerHTML = Math.round(vref);
}

</script>

</body>
</html>
