<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0b0f14;
    color: #e6e6e6;
}

.header {
    background: #0f1620;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #1f2a3a;
}

.container {
    width: 1000px;
    margin: 20px auto;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.panel {
    background:#121a24;
    padding:15px;
    border-radius:10px;
}

.title {
    font-size:12px;
    color:#8aa0b6;
    margin-bottom:12px;
    border-bottom:1px solid #1f2a3a;
}

.field {
    display:flex;
    justify-content:space-between;
    background:#1a2633;
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
}

.field input, .field select {
    margin-left:12px;
    padding:6px;
    border-radius:5px;
    border:1px solid #2a3a4d;
    background:#0f1620;
    color:#e6e6e6;
}

.button {
    background:#2d7dff;
    padding:10px;
    border-radius:6px;
    border:none;
    width:100%;
    font-weight:bold;
}

.output {
    margin-top:10px;
    background:#0f1620;
    padding:10px;
    border-radius:6px;
    border:1px solid #1f2a3a;
    font-family:monospace;
}

.green { color:#4df07d; }
.yellow { color:#ffd34d; }
</style>
</head>

<body>

<div class="header">
    <div>B737 OPT PERFORMANCE TOOL</div>
    <span>TAKEOFF + LANDING</span>
</div>

<div class="container">
<div class="row">

<!-- TAKEOFF -->
<div class="panel">
<div class="title">TAKEOFF DATA</div>

<div class="field"><span>Weight</span><input id="tw" value="65000"></div>
<div class="field"><span>OAT</span><input id="tt" value="15"></div>
<div class="field"><span>Wind</span><input id="twind" value="0"></div>
<div class="field"><span>Pressure</span><input id="tpress" value="1013"></div>
<div class="field"><span>Runway</span><input id="trwy" value="2500"></div>

<button class="button" onclick="calcTakeoff()">CALCULATE TAKEOFF</button>

<div class="output" id="toOut">READY</div>
</div>

<!-- LANDING -->
<div class="panel">
<div class="title">LANDING DATA</div>

<div class="field"><span>Weight</span><input id="lw" value="60000"></div>
<div class="field"><span>OAT</span><input id="lt" value="15"></div>
<div class="field"><span>Wind</span><input id="lwind" value="0"></div>

<div class="field">
<span>Surface</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">CALCULATE LANDING</button>

<div class="output" id="loOut">READY</div>
</div>

</div>
</div>

<!-- SCRIPT AT VERY BOTTOM -->
<script>

function num(id){
    var v = parseFloat(document.getElementById(id).value);
    return isNaN(v) ? 0 : v;
}

function calcTakeoff(){
    var w = num("tw");
    var t = num("tt");
    var wind = num("twind");
    var press = num("tpress");
    var rwy = num("trwy");

    var base = {v1:125, vr:126, v2:135};

    var v1 = base.v1 + (w-65000)*0.0012 + (t-15)*0.05 + wind*-0.015 + (1013-press)*0.015;
    var vr = base.vr + (w-65000)*0.0012 + (t-15)*0.05 + wind*-0.015 + (1013-press)*0.015;
    var v2 = base.v2 + (w-65000)*0.0012 + (t-15)*0.05 + wind*-0.015 + (1013-press)*0.015;

    var spacing = 6 + Math.max(0,(w-65000)*0.0001);
    vr = Math.max(vr, v1+1);
    v2 = Math.max(v2, vr+spacing);

    v1 = Math.round(v1 + 12);
    vr = Math.round(vr + 12);
    v2 = Math.round(v2 + 12);

    var flex = Math.round(Math.max(35, Math.min(55, 30 + (65000-w)*0.0005 + (15-t)*0.25)));

    var bleed = (rwy < 2000 || w > 68000) ? "REDUCED" : "AUTO";
    var antiIce = (t < 5) ? "ON" : "OFF";

    document.getElementById("toOut").innerHTML =
    "V1: <span class='green'>" + v1 + "</span><br>" +
    "VR: <span class='green'>" + vr + "</span><br>" +
    "V2: <span class='green'>" + v2 + "</span><br>" +
    "FLEX: <span class='yellow'>" + flex + "°C</span><br>" +
    "BLEED: " + bleed + "<br>" +
    "ANTI-ICE: " + antiIce + "<br>" +
    "FLAPS: 5";
}

function calcLanding(){
    var w = num("lw");
    var t = num("lt");
    var wind = num("lwind");
    var surf = document.getElementById("lsurf").value;

    var vref = 125 + (w-60000)*0.0006 + wind*0.2;

    var mult = (surf=="dry") ? 1 : (surf=="wet") ? 1.18 : 1.35;
    var dist = 1400*(0.7 + w/70000)*(1+(t-15)*0.01)*mult;

    document.getElementById("loOut").innerHTML =
    "VREF: <span class='yellow'>" + Math.round(vref) + "</span><br>" +
    "LDG DIST: <span class='green'>" + Math.round(dist) + " m</span>";
}

</script>

</body>
</html>
