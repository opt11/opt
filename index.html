<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>

body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0b0f14;
    color:#fff;
}

/* TOP BAR */
.topbar {
    background:#121720;
    padding:8px;
    text-align:center;
    font-size:13px;
    letter-spacing:1.5px;
    color:#9aa4b2;
}

/* MAIN LAYOUT */
.main {
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    gap:10px;
    padding:12px;
}

.left {
    background:#10151d;
    padding:12px;
}

.right {
    background:#0d1218;
}

/* ROWS — now flat like OPT */
.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 4px;
    border-bottom:1px solid #1c2330;
}

/* LABELS */
.label {
    font-size:12px;
    color:#7f8a99;
    letter-spacing:0.5px;
}

/* INPUTS */
input, select {
    background:transparent;
    border:none;
    border-bottom:1px solid #2a3240;
    color:#fff;
    padding:4px;
    width:120px;
    text-align:right;
    font-size:13px;
}

/* BUTTON */
.button {
    margin-top:8px;
    float:right;
    background:#1f2633;
    border:1px solid #2f394a;
    padding:5px 12px;
    font-size:12px;
    color:#fff;
}

/* OUTPUT TEXT */
.output {
    margin-top:10px;
    font-family:monospace;
    font-size:12px;
    color:#b8c1cc;
}

/* BOTTOM STRIP */
.bottom {
    margin-top:6px;
    background:#000;
    padding:12px 18px;
    display:flex;
    align-items:center;
    position:relative;
}

/* ATM WATERMARK */
.atm-inline {
    position:absolute;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    font-size:150px;
    font-weight:900;
    opacity:0.10;
    letter-spacing:12px;
}

/* RIGHT SIDE DATA STRIP */
.vstrip {
    margin-left:auto;
    display:flex;
    align-items:flex-end;
    gap:28px;
}

/* EACH CELL */
.vcell {
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* SMALL LABEL */
.vlabel {
    font-size:10px;
    color:#6f7a88;
    margin-bottom:3px;
    letter-spacing:1px;
}

/* BIG VALUE */
.vbig {
    font-size:40px;
    font-weight:900;
    color:#ffffff;
    line-height:1;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE - TAKEOFF</div>

<div class="main">

<div class="left">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG (%MAC)</span><input id="tcg" value="25"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>

<div class="row">
<span class="label">RUNWAY HDG</span>
<input id="rwyhdg" value="090">
</div>

<div class="row">
<span class="label">RUNWAY LENGTH</span>
<input id="rwylength" value="3000m">
</div>

<div class="row">
<span class="label">THRUST MODE</span>
<select id="mode">
<option value="atm">ATM</option>
<option value="full">FULL</option>
</select>
</div>

<button class="button" onclick="calcTakeoff()">CALC</button>

<div class="output" id="toOut">READY</div>

<hr style="border-color:#1c2330;">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">CALC</button>

<div class="output" id="loOut">READY</div>

</div>

<div class="right"></div>

</div>

<!-- OPT STRIP -->
<div class="bottom">

<div class="atm-inline" id="atmLabel">ATM</div>

<div class="vstrip">

<div class="vcell">
    <div class="vlabel">FLAP</div>
    <div class="vbig">5</div>
</div>

<div class="vcell">
    <div class="vlabel">ACCEL HT</div>
    <div class="vbig">1500</div>
</div>

<div class="vcell">
    <div class="vlabel">V1</div>
    <div class="vbig" id="v1b">---</div>
</div>

<div class="vcell">
    <div class="vlabel">VR</div>
    <div class="vbig" id="vrb">---</div>
</div>

<div class="vcell">
    <div class="vlabel">V2</div>
    <div class="vbig" id="v2b">---</div>
</div>

</div>

</div>

<script>

/* 🔒 EXACT SAME LOGIC — UNTOUCHED */

function num(v){
    return parseFloat((v+"").replace(/[^0-9.\-]/g,"")) || 0;
}

function wind(v){
    v = (v+"").split("/");
    return num(v.length > 1 ? v[1] : v[0]);
}

function runwayLength(v){
    v = (v+"").toLowerCase();
    var value = parseFloat(v.replace(/[^0-9.]/g,"")) || 0;
    if(v.indexOf("ft") !== -1) return value * 0.3048;
    return value;
}

function calcTakeoff(){

    var w = num(document.getElementById("tw").value);
    var t = num(document.getElementById("tt").value);
    var press = num(document.getElementById("tpress").value);
    var windv = wind(document.getElementById("twind").value);
    var mode = document.getElementById("mode").value;

    var rwyhdg = num(document.getElementById("rwyhdg").value);
    var rwylength = runwayLength(document.getElementById("rwylength").value);

    document.getElementById("atmLabel").innerHTML =
        (mode === "atm") ? "ATM" : "FULL";

    var weightFactor = (w - 65000) * 0.0011;
    var tempFactor = (t - 15) * 0.22;
    var pressFactor = (1013 - press) * 0.015;
    var windFactor = -windv * 0.04;

    var headingPenalty = Math.abs((rwyhdg % 360) - 180) / 180;
    var rwyEffect = (headingPenalty - 0.5) * 1.5;

    var v1 = 132 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;
    var vr = 134 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;
    var v2 = 144 + weightFactor + tempFactor + pressFactor + windFactor + rwyEffect;

    if(mode === "atm"){
        v1 -= 1; vr -= 1; v2 -= 1;
    } else {
        v1 += 2; vr += 2; v2 += 2;
    }

    var rwyClamp = Math.min(1.03, Math.max(0.98, rwylength / 2500));
    v1 *= rwyClamp;
    vr *= rwyClamp;
    v2 *= rwyClamp;

    vr = Math.max(vr, v1 + 1);
    v2 = Math.max(v2, vr + 6);

    v1 = Math.round(v1 + 8);
    vr = Math.round(vr + 8);
    v2 = Math.round(v2 + 8);

    document.getElementById("toOut").innerHTML =
        "MODE: " + mode.toUpperCase() + "<br>" +
        "V1: " + v1 + "<br>" +
        "VR: " + vr + "<br>" +
        "V2: " + v2;

    document.getElementById("v1b").innerHTML = v1;
    document.getElementById("vrb").innerHTML = vr;
    document.getElementById("v2b").innerHTML = v2;
}

function calcLanding(){

    var w = num(document.getElementById("lw").value);
    var t = num(document.getElementById("lt").value);
    var windv = wind(document.getElementById("lwind").value);

    var vref = 130 + (w - 60000) * 0.00055 + windv * 0.15;
    var dist = 1400 * (0.7 + w / 70000) * (1 + (t - 15) * 0.01);

    document.getElementById("loOut").innerHTML =
        "VREF: " + Math.round(vref) + "<br>" +
        "LDG DIST: " + Math.round(dist) + " m";
}

</script>

</body>
</html>
