<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>

body {
    margin:0;
    font-family: "Segoe UI", Arial;
    background:#1c1f26;
    color:#cfd6df;
}

.topbar {
    background:#2a2f38;
    padding:10px;
    text-align:center;
    font-weight:600;
    font-size:14px;
}

/* layout */
.main {
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:20px;
    padding:20px;
}

.left, .right {
    background:#222833;
    padding:15px;
}

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2e3542;
    padding:8px 10px;
    margin-bottom:8px;
    font-size:13px;
}

.label { color:#9aa6b2; }

input, select {
    background:#1c1f26;
    border:none;
    color:#00d084;
    padding:4px 6px;
    width:130px;
    text-align:right;
}

/* BUTTON LIKE IMAGE */
.button {
    float:right;
    background:#3a4250;
    border:1px solid #5a6475;
    padding:6px 14px;
    color:#dfe6ef;
    font-size:13px;
    cursor:pointer;
}

.button:hover {
    background:#4a5363;
}

/* OUTPUT */
.output {
    margin-top:15px;
    font-family:monospace;
}

/* BIG V SPEEDS */
.vbig {
    font-size:28px;
    font-weight:700;
}

.green { color:#00d084; }
.blue { color:#4da6ff; }

/* BOTTOM */
.bottom {
    margin-top:15px;
    background:#000;
    padding:15px;
    display:grid;
    grid-template-columns: repeat(5,1fr);
}

.bottom span {
    font-size:24px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE - TAKEOFF</div>

<div class="main">

<div class="left">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>
<div class="row"><span class="label">RWY DIST</span><input id="trwy" value="2500m"></div>

<button class="button" onclick="calcTakeoff()">Calculate</button>

<div class="output" id="toOut">READY</div>

<hr style="border-color:#333; margin:15px 0;">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">Calculate</button>

<div class="output" id="loOut">READY</div>

</div>

<div class="right">
<div class="blue">SEE SPECIAL PROCEDURE IN AIRPORT INFO – RUNWAY COMMENT</div>
</div>

</div>

<div class="bottom">
<div>FLAP<br><span class="green">5</span></div>
<div>ACCEL HT<br><span class="green">1500 ft</span></div>
<div>V1<br><span id="v1b">---</span></div>
<div>VR<br><span id="vrb">---</span></div>
<div>V2<br><span id="v2b">---</span></div>
</div>

<script>

/* SMART PARSERS */

function parseWeight(val){
    val = val.toLowerCase();
    let num = parseFloat(val);
    if(val.includes("lb")) num *= 0.453592;
    return num;
}

function parseTemp(val){
    val = val.toLowerCase();
    let num = parseFloat(val);
    if(val.includes("f")) num = (num - 32) * 5/9;
    return num;
}

function parsePressure(val){
    val = val.toLowerCase();
    let num = parseFloat(val);
    if(val.includes("in")) num *= 33.864;
    return num;
}

function parseWind(val){
    val = val.toLowerCase();
    let parts = val.split("/");
    return parseFloat(parts.length > 1 ? parts[1] : parts[0]);
}

function parseDistance(val){
    val = val.toLowerCase();
    let num = parseFloat(val);
    if(val.includes("ft")) num *= 0.3048;
    return num;
}
