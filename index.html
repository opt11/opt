<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>

body {
    margin:0;
    font-family: "Segoe UI", Arial;
    background:#1c1f26;
    color:#cfd6df;
}

.topbar {
    background:#2a2f38;
    padding:12px;
    text-align:center;
    font-weight:600;
    font-size:15px;
}

.main {
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:20px;
    padding:20px;
}

.left, .right {
    background:#222833;
    padding:18px;
}

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2e3542;
    padding:12px 14px;
    margin-bottom:12px;
    font-size:14px;
}

.label { color:#9aa6b2; font-weight:500; }

input, select {
    background:#1c1f26;
    border:1px solid #3a4250;
    color:#00d084;
    padding:10px 12px;
    width:170px;
    font-size:16px;
    border-radius:4px;
    text-align:right;
}

.button {
    float:right;
    background:#3a4250;
    border:1px solid #5a6475;
    padding:8px 18px;
    color:#dfe6ef;
    font-size:14px;
    cursor:pointer;
}

.output {
    margin-top:15px;
    font-family:monospace;
    font-size:15px;
}

.vbig { font-size:32px; font-weight:800; }
.biginfo { font-size:22px; font-weight:900; }

.green { color:#00d084; }
.blue { color:#4da6ff; }
.orange { color:#ffb74d; }

.bottom {
    margin-top:15px;
    background:#000;
    padding:18px;
    display:grid;
    grid-template-columns: repeat(5,1fr);
}

.bottom span {
    font-size:26px;
    font-weight:800;
}

.watermark {
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:14px;
    opacity:0.25;
    font-weight:700;
    color:#00d084;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE - TAKEOFF</div>

<div class="main">

<div class="left">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">CG (% MAC)</span><input id="tcg" value="25.0"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>

<div class="row">
<span class="label">THRUST</span>
<select id="mode" onchange="updateMode()">
<option value="atm">ATM</option>
<option value="full">FULL</option>
</select>
</div>

<button class="button" onclick="calcTakeoff()">Calculate</button>

<div class="output" id="toOut">READY</div>

<hr style="border-color:#333; margin:15px 0;">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">Calculate</button>

<div class="output" id="loOut">READY</div>

</div>

<div class="right">
<div class="blue">OPT SYSTEM ACTIVE – FLIGHT PERFORMANCE MODE</div>
</div>

</div>

<div class="bottom">
<div>FLAP<br><span class="green">5</span></div>
<div>ACCEL HT<br><span class="green">1500 ft</span></div>
<div>V1<br><span id="v1b">---</span></div>
<div>VR<br><span id="vrb">---</span></div>
<div>V2<br><span id="v2b">---</span></div>
</div>

<div class="watermark">OPT SIM / TABLE MODEL</div>

<script type="text/javascript">

/* =========================
   BASIC PARSERS (iOS SAFE)
========================= */

window.parseWeight = function(val){
    val = val.toLowerCase();
    var n = parseFloat(val);
    if(val.indexOf("lb") !== -1) n *= 0.453592;
    return n;
};

window.parseWind = function(val){
    val = val.toLowerCase();
    var p = val.split("/");
    return parseFloat(p.length > 1 ? p[1] : p[0]);
};

/* =========================
   REALISTIC TRIM TABLE MODEL
========================= */

var trimTable = [
    {cg: 18, base: 6.6},
    {cg: 20, base: 6.0},
    {cg: 22, base: 5.6},
    {cg: 24, base: 5.2},
    {cg: 26, base: 4.8},
    {cg: 28, base: 4.5},
    {cg: 30, base: 4.2},
    {cg: 32, base: 4.0}
];

function getTrimFromCG(cg, weight){

    // clamp CG
    if(cg < 18) cg = 18;
    if(cg > 32) cg = 32;

    // find surrounding table points
    var lower = trimTable[0];
    var upper = trimTable[trimTable.length - 1];

    for(var i=0;i<trimTable.length-1;i++){
        if(cg >= trimTable[i].cg && cg <= trimTable[i+1].cg){
            lower = trimTable[i];
            upper = trimTable[i+1];
            break;
        }
    }

    // linear interpolation (real EFB style)
    var ratio = (cg - lower.cg) / (upper.cg - lower.cg);
    var trim = lower.base + (upper.base - lower.base) * ratio;

    // weight correction (light effect)
    trim += (weight - 65000) * 0.000015;

    // 737 flaps 5 bias
    trim -= 0.2;

    // clamp to green band
    if(trim < 3.5) trim = 3.5;
    if(trim > 7.8) trim = 7.8;

    return Math.round(trim * 10) / 10;
}

/* =========================
   TAKEOFF CALC
========================= */

window.calcTakeoff = function(){

    var w = parseWeight(document.getElementById("tw").value);
    var cg = parseFloat(document.getElementById("tcg").value);
    var mode = document.getElementById("mode").value;

    var base = {v1:125, vr:126, v2:135};

    var v1 = base.v1 + (w-65000)*0.0012;
    var vr = base.vr + (w-65000)*0.0012;
    var v2 = base.v2 + (w-65000)*0.0012;

    v1 = Math.round(v1);
    vr = Math.round(vr);
    v2 = Math.round(v2);

    var trim = getTrimFromCG(cg, w);

    document.getElementById("toOut").innerHTML =
    "V1: <span class='green vbig'>" + v1 + "</span><br>" +
    "VR: <span class='green vbig'>" + vr + "</span><br>" +
    "V2: <span class='green vbig'>" + v2 + "</span><br>" +
    "TRIM: <span class='orange biginfo'>" + trim + " UNITS</span><br>" +
    "MODE: <span class='blue biginfo'>" + mode.toUpperCase() + "</span><br>" +
    "FLAPS: <span class='biginfo'>5</span>";
};

/* =========================
   LANDING (UNCHANGED STYLE)
========================= */

window.calcLanding = function(){

    var w = parseWeight(document.getElementById("lw").value);
    var t = parseFloat(document.getElementById("lt").value);

    var vref = 125 + (w-60000)*0.0006;

    var dist = 1400*(0.7 + w/70000)*(1+(t-15)*0.01);

    document.getElementById("loOut").innerHTML =
    "VREF: <span class='blue biginfo'>" + Math.round(vref) + "</span><br>" +
    "LDG DIST: <span class='green biginfo'>" + Math.round(dist) + " m</span>";
};

window.updateMode = function(){};

</script>

</body>
</html>
