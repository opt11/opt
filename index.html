<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>B737 OPT</title>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#fff; }

.topbar {
    background:#121720;
    padding:8px;
    text-align:center;
    font-size:13px;
}

.row {
    display:flex;
    justify-content:space-between;
    padding:8px 12px;
    border-bottom:1px solid #1c2330;
}

.half {
    width:48%;
    display:flex;
    justify-content:space-between;
}

.label { font-size:12px; color:#7f8a99; }

input, select {
    background:transparent;
    border:none;
    border-bottom:1px solid #2a3240;
    color:#fff;
    width:110px;
    text-align:right;
}

.buttonRow {
    display:flex;
    justify-content:space-between;
    padding:0 12px;
}

.button {
    padding:12px;
    background:#1f2633;
    border:1px solid #2f394a;
    color:#fff;
}

.calcBtn { width:65%; }
.modeBtn { width:30%; }

.bottom {
    margin:12px;
    background:#000;
    height:340px;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
}

.atm-inline {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:180px;
    opacity:0.05;
}

.topline {
    display:flex;
    justify-content:space-between;
}

.tow { font-size:40px; font-weight:900; }
.sel { font-size:26px; }

.vstrip {
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

.vcell { text-align:center; flex:1; }

.vbig {
    font-size:44px;
    font-weight:900;
}
</style>
</head>

<body>

<div class="topbar">B737 PERFORMANCE</div>

<div id="tkofPage">

<!-- RESTORED TAKEOFF INPUTS -->
<div class="row">
<div class="half"><span class="label">WEIGHT</span><input id="tw" value="51600kg"></div>
<div class="half"><span class="label">CG</span><input id="cg" value="22.4"></div>
</div>

<div class="row">
<div class="half"><span class="label">OAT</span><input id="tt" value="11C"></div>
<div class="half"><span class="label">PRESS</span><input id="tpress" value="1015hPa"></div>
</div>

<div class="row">
<div class="half"><span class="label">RWY LEN</span><input id="rwylength" value="6500ft"></div>
<div class="half">
<span class="label">FLAPS</span>
<select id="flap">
<option value="opt">OPT</option>
<option value="1">1</option>
<option value="5">5</option>
<option value="15">15</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">ATM MODE</span>
<select id="atmMode">
<option value="max">MAX</option>
<option value="opt" selected>OPT</option>
<option value="full">FULL</option>
</select>
</div>
<div class="half">
<span class="label">COND</span>
<select id="cond">
<option value="dry">DRY</option>
<option value="wet">WET</option>
<option value="cont">CONT</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">WIND</span>
<input id="wind" value="0">
</div>
<div class="half">
<span class="label">SLOPE %</span>
<input id="slope" value="0">
</div>
</div>

<div class="row">
<div class="half">
<span class="label">ANTI ICE</span>
<select id="anti">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>
</div>
<div class="half">
<span class="label">PACS</span>
<select id="packs">
<option value="on">ON</option>
<option value="off">OFF</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">RTG</span>
<select id="rtg">
<option value="0">OFF</option>
<option value="1">RTG1</option>
<option value="2">RTG2</option>
</select>
</div>
<div class="half"></div>
</div>

</div>

<!-- LANDING INPUTS -->
<div id="ldgPage" style="display:none;">

<div class="row">
<div class="half"><span class="label">LAND WT</span><input id="ldgw" value="48000kg"></div>
<div class="half">
<span class="label">FLAPS</span>
<select id="ldgFlap">
<option value="opt">OPT</option>
<option value="15">15</option>
<option value="30">30</option>
<option value="40">40</option>
</select>
</div>
</div>

<div class="row">
<div class="half">
<span class="label">WIND</span>
<input id="ldgWind" value="0">
</div>
<div class="half">
<span class="label">SLOPE %</span>
<input id="ldgSlope" value="0">
</div>
</div>

<div class="row">
<div class="half">
<span class="label">COND</span>
<select id="ldgCond">
<option value="dry">DRY</option>
<option value="wet">WET</option>
<option value="cont">CONT</option>
</select>
</div>
<div class="half"></div>
</div>

</div>

<div class="buttonRow">
<button class="button calcBtn" onclick="calc()">CALCULATE</button>
<button class="button modeBtn" onclick="toggleMode()" id="phaseBtn">TKOF</button>
</div>

<div class="bottom">

<div class="atm-inline" id="modeLabel"></div>

<div class="topline">
<div class="tow" id="tow">---</div>
<div class="sel" id="sel">---</div>
</div>

<div class="vstrip">

<div class="vcell">
<div>FLAP</div>
<div class="vbig" id="v1">--</div>
</div>

<div class="vcell">
<div>V1 / VREF</div>
<div class="vbig" id="vr">--</div>
</div>

<div class="vcell">
<div>V2 / LDG</div>
<div class="vbig" id="v2">--</div>
</div>

<div class="vcell">
<div>ABRK</div>
<div class="vbig" id="ab">--</div>
</div>

</div>

</div>

<script>

function num(v){
    v = (v+"").toLowerCase();
    return parseFloat(v.replace(/[^0-9.\-]/g,"")) || 0;
}

function toggleMode(){
    var btn = document.getElementById("phaseBtn");

    if(btn.innerHTML === "TKOF"){
        btn.innerHTML = "LDG";
        document.getElementById("tkofPage").style.display = "none";
        document.getElementById("ldgPage").style.display = "block";
    } else {
        btn.innerHTML = "TKOF";
        document.getElementById("tkofPage").style.display = "block";
        document.getElementById("ldgPage").style.display = "none";
    }
}

function calc(){

var phase = document.getElementById("phaseBtn").innerHTML;

/* ================= TAKEOFF ================= */
if(phase === "TKOF"){

var w = num(document.getElementById("tw").value);
var len = num(document.getElementById("rwylength").value);
var oat = num(document.getElementById("tt").value);

var wind = num(document.getElementById("wind").value);
var slope = num(document.getElementById("slope").value);

var cond = document.getElementById("cond").value;

var flap = document.getElementById("flap").value;
if(flap === "opt"){
    if(len < 6000) flap = "15";
    else if(len < 8000) flap = "5";
    else flap = "1";
}

var base = 110 + (w / 4000);

var v1 = base;
var vr = base + 3;
var v2 = base + 12;

if(cond === "wet"){ v1 += 2; vr += 2; v2 += 3; }
if(cond === "cont"){ v1 += 4; vr += 4; v2 += 5; }

if(document.getElementById("rtg").value === "1"){ v1 -= 2; vr -= 2; v2 -= 2; }
if(document.getElementById("rtg").value === "2"){ v1 -= 4; vr -= 4; v2 -= 4; }

document.getElementById("v1").innerHTML = Math.round(v1);
document.getElementById("vr").innerHTML = Math.round(vr);
document.getElementById("v2").innerHTML = Math.round(v2);

document.getElementById("sel").innerHTML = "SEL " + Math.round(oat + 28);
document.getElementById("tow").innerHTML = "TOWG " + Math.round(w - 250);

document.getElementById("ab").innerHTML = "";
document.getElementById("modeLabel").innerHTML = "ATM";

}

/* ================= LANDING ================= */
if(phase === "LDG"){

var w = num(document.getElementById("ldgw").value);
var wind = num(document.getElementById("ldgWind").value);
var slope = num(document.getElementById("ldgSlope").value);
var cond = document.getElementById("ldgCond").value;

var flap = document.getElementById("ldgFlap").value;
if(flap === "opt"){
    flap = (w > 60000) ? 40 : (w > 52000 ? 30 : 15);
}

var vref = 105 + (w / 6000) + (flap * 0.35);
var vapp = vref + wind * 0.2;

var dist = 1200 + (w / 45);

if(cond === "wet") dist *= 1.25;
if(cond === "cont") dist *= 1.55;

dist -= wind * 18;
dist += slope * 250;

if(dist < 600) dist = 600;

/* AUTOBRAKE */
var ab =
    (dist < 900) ? "1" :
    (dist < 1200) ? "2" :
    (dist < 1600) ? "3" : "MAX";

document.getElementById("v1").innerHTML = "FL " + flap;
document.getElementById("vr").innerHTML = Math.round(vref) + "/" + Math.round(vapp);
document.getElementById("v2").innerHTML = Math.round(dist) + "m";
document.getElementById("ab").innerHTML = ab;

document.getElementById("sel").innerHTML = "VREF " + Math.round(vref);
document.getElementById("tow").innerHTML = "LW " + Math.round(w);

document.getElementById("modeLabel").innerHTML = "LDG";
}

}

</script>

</body>
</html>
