<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B737 OPT Performance Tool</title>

<style>

body {
    margin:0;
    font-family: "Segoe UI", Arial;
    background:#1c1f26;
    color:#cfd6df;
}

.topbar {
    background:#2a2f38;
    padding:12px;
    text-align:center;
    font-weight:600;
    font-size:15px;
}

.main {
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:20px;
    padding:20px;
}

.left, .right {
    background:#222833;
    padding:18px;
}

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2e3542;
    padding:12px 14px;
    margin-bottom:12px;
    font-size:14px;
}

.label { 
    color:#9aa6b2; 
    font-weight:500;
}

input, select {
    background:#1c1f26;
    border:1px solid #3a4250;
    color:#00d084;
    padding:10px 12px;
    width:170px;
    font-size:16px;
    border-radius:4px;
    text-align:right;
}

.button {
    float:right;
    background:#3a4250;
    border:1px solid #5a6475;
    padding:8px 18px;
    color:#dfe6ef;
    font-size:14px;
    cursor:pointer;
}

.button:hover {
    background:#4a5363;
}

.output {
    margin-top:15px;
    font-family:monospace;
    font-size:15px;
}

.vbig {
    font-size:32px;
    font-weight:800;
}

.green { color:#00d084; }
.blue { color:#4da6ff; }

/* 🔥 NEW BIG INFO STYLE */
.biginfo {
    font-size:26px;
    font-weight:900;
}

.bottom {
    margin-top:15px;
    background:#000;
    padding:18px;
    display:grid;
    grid-template-columns: repeat(5,1fr);
}

.bottom span {
    font-size:26px;
    font-weight:800;
}

</style>
</head>

<body>

<div class="topbar">PERFORMANCE - TAKEOFF</div>

<div class="main">

<div class="left">

<div class="row"><span class="label">WEIGHT</span><input id="tw" value="65000kg"></div>
<div class="row"><span class="label">OAT</span><input id="tt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="twind" value="150/5KT"></div>
<div class="row"><span class="label">PRESS</span><input id="tpress" value="1013hPa"></div>
<div class="row"><span class="label">RWY DIST</span><input id="trwy" value="2500m"></div>

<button class="button" onclick="calcTakeoff()">Calculate</button>

<div class="output" id="toOut">READY</div>

<hr style="border-color:#333; margin:15px 0;">

<div class="row"><span class="label">LDG WT</span><input id="lw" value="60000kg"></div>
<div class="row"><span class="label">OAT</span><input id="lt" value="15C"></div>
<div class="row"><span class="label">WIND</span><input id="lwind" value="0"></div>

<div class="row">
<span class="label">SURFACE</span>
<select id="lsurf">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
<option value="contaminated">Contaminated</option>
</select>
</div>

<button class="button" onclick="calcLanding()">Calculate</button>

<div class="output" id="loOut">READY</div>

</div>

<div class="right">
<div class="blue">SEE SPECIAL PROCEDURE IN AIRPORT INFO – RUNWAY COMMENT</div>
</div>

</div>

<div class="bottom">
<div>FLAP<br><span class="green biginfo">5</span></div>
<div>ACCEL HT<br><span class="green">1500 ft</span></div>
<div>V1<br><span id="v1b">---</span></div>
<div>VR<br><span id="vrb">---</span></div>
<div>V2<br><span id="v2b">---</span></div>
</div>

<script type="text/javascript">

window.parseWeight = function(val){
    val = val.toLowerCase();
    var num = parseFloat(val);
    if(val.indexOf("lb") !== -1) num *= 0.453592;
    return num;
};

window.parseTemp = function(val){
    val = val.toLowerCase();
    var num = parseFloat(val);
    if(val.indexOf("f") !== -1) num = (num - 32) * 5/9;
    return num;
};

window.parsePressure = function(val){
    val = val.toLowerCase();
    var num = parseFloat(val);
    if(val.indexOf("in") !== -1) num *= 33.864;
    return num;
};

window.parseWind = function(val){
    val = val.toLowerCase();
    var parts = val.split("/");
    return parseFloat(parts.length > 1 ? parts[1] : parts[0]);
};

window.parseDistance = function(val){
    val = val.toLowerCase();
    var num = parseFloat(val);
    if(val.indexOf("ft") !== -1) num *= 0.3048;
    return num;
};

window.calcTakeoff = function(){

    var w = parseWeight(document.getElementById("tw").value);
    var t = parseTemp(document.getElementById("tt").value);
    var wind = parseWind(document.getElementById("twind").value);
    var press = parsePressure(document.getElementById("tpress").value);
    var rwy = parseDistance(document.getElementById("trwy").value);

    var base = {v1:125, vr:126, v2:135};

    var v1 = base.v1 + (w-65000)*0.0012 + (t-15)*0.05 + wind*-0.015 + (1013-press)*0.015;
    var vr = base.vr + (w-65000)*0.0012 + (t-15)*0.05 + wind*-0.015 + (1013-press)*0.015;
    var v2 = base.v2 + (w-65000)*0.0012 + (t-15)*0.05 + wind*-0.015 + (1013-press)*0.015;

    var spacing = 6 + Math.max(0,(w-65000)*0.0001);
    vr = Math.max(vr, v1+1);
    v2 = Math.max(v2, vr+spacing);

    v1 = Math.round(v1 + 12);
    vr = Math.round(vr + 12);
    v2 = Math.round(v2 + 12);

    var flex = Math.round(Math.max(35, Math.min(55, 30 + (65000-w)*0.0005 + (15-t)*0.25)));

    var bleed = (rwy < 2000 || w > 68000) ? "REDUCED" : "AUTO";
    var antiIce = (t < 5) ? "ON" : "OFF";

    document.getElementById("toOut").innerHTML =
    "V1: <span class='green vbig'>" + v1 + "</span><br>" +
    "VR: <span class='green vbig'>" + vr + "</span><br>" +
    "V2: <span class='green vbig'>" + v2 + "</span><br>" +
    "FLEX: <span class='blue biginfo'>" + flex + "°C</span><br>" +
    "BLEED: <span class='biginfo'>" + bleed + "</span><br>" +
    "ANTI-ICE: <span class='biginfo'>" + antiIce + "</span><br>" +
    "FLAPS: <span class='biginfo'>5</span>";

    document.getElementById("v1b").innerText = v1;
    document.getElementById("vrb").innerText = vr;
    document.getElementById("v2b").innerText = v2;
};

window.calcLanding = function(){
    var w = parseWeight(document.getElementById("lw").value);
    var t = parseTemp(document.getElementById("lt").value);
    var wind = parseWind(document.getElementById("lwind").value);
    var surf = document.getElementById("lsurf").value;

    var vref = 125 + (w-60000)*0.0006 + wind*0.2;

    var mult = (surf=="dry") ? 1 : (surf=="wet") ? 1.18 : 1.35;
    var dist = 1400*(0.7 + w/70000)*(1+(t-15)*0.01)*mult;

    document.getElementById("loOut").innerHTML =
    "VREF: <span class='blue'>" + Math.round(vref) + "</span><br>" +
    "LDG DIST: <span class='green'>" + Math.round(dist) + " m</span>";
};

</script>

</body>
</html>
